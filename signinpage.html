<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Livekolab — Create Account</title>
        <link rel="stylesheet" href="signinpage.css">
        <script type="module" src="firebaseauthentication.js" defer></script>
    </head>
    <body>
        <div class="signstyles">
            <div class="container">
                <h1 class="title">Create your account</h1>
                <p class="signup-subtitle">Join Livekolab and start visualizing data</p>
                <form id="signinform">
                    <input class="insidesignin" type="text" placeholder="Full name" id="name" autocomplete="off">
                    <input class="insidesignin" type="text" placeholder="Email address" id="email" autocomplete="off">
                    <input class="insidesignin" type="password" placeholder="Password" id="password" autocomplete="off">
                    <button class="submitbutton" id="submit" type="submit">Create Account</button>
                </form>
                <p class="login-link">Already have an account? <a href="loginpage.html">Sign in</a></p>
            </div>
        </div>
    </body>
</html>
