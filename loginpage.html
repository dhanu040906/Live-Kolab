<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Livekolab — Sign In</title>
        <link rel="stylesheet" href="loginpage.css">
        <script type="module" src="loginpage.js" defer></script>
    </head>
    <body>
        <div class="container">
            <h1 class="title">Welcome back</h1>
            <p class="subtitle">Sign in to your Livekolab account</p>
            <input class="inputtags" id="email" type="text" placeholder="Email address" autocomplete="off">
            <input class="inputtags" id="password" type="password" placeholder="Password" autocomplete="off">
            <div class="button-group">
                <button class="buttons login" id="login" type="submit">Sign In</button>
                <button class="buttons signup" onclick="location.href='signinpage.html'" type="button">Create an account</button>
            </div>
        </div>
    </body>
</html>
